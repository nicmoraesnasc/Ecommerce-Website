name: Continuous Integration

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flask requests mysql-connector-python pytest werkzeug

      - name: Verificar sintaxe
        run: |
          python -m py_compile src/adornsaturn/index.py
          python -m py_compile src/adornsaturn/database.py

      - name: Executar testes
        env:
          PYTHONPATH: src/adornsaturn
        run: |
          pytest tests/ -v