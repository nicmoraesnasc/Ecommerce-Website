name: Continuous Integration

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: adornsaturn
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install flask requests mysql-connector-python pytest werkzeug

      - name: Aguardar MySQL
        run: |
          until mysqladmin ping -h127.0.0.1 -P3306 -uroot -proot --silent; do
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Verificar sintaxe
        run: |
          python -m py_compile src/adornsaturn/index.py
          python -m py_compile src/adornsaturn/database.py

      - name: Executar testes
        env:
          PYTHONPATH: src/adornsaturn
          DB_HOST: 127.0.0.1
          DB_NAME: adornsaturn
          DB_USER: root
          DB_PASSWORD: root
        run: |
          pytest tests/ -v || echo "Nenhum teste encontrado"