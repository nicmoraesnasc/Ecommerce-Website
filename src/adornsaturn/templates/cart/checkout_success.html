<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Compra Finalizada</title>
</head>
<body>
    {% include 'header/index.html' %}
    
    <div class="checkout-success" role="main" aria-label="Página de confirmação de compra finalizada">
        <h2>Compra Finalizada com Sucesso!</h2>
        <div class="order-details" aria-label="Detalhes do pedido">
            <p>Seu código de rastreamento é: <strong aria-label="Código de rastreamento {{ tracking_code }}">{{ tracking_code }}</strong></p>
            <p>Você receberá um e-mail com os detalhes do envio.</p>
            
            <div class="shipping-info" aria-labelledby="shipping-heading">
                <h3 id="shipping-heading">Endereço de Envio:</h3>
                <p>{{ order.shipping_address }}</p>
                <p>{{ order.shipping_city }} - {{ order.shipping_state }}</p>
            </div>
        </div>
        <a href="{{ url_for('products') }}" class="btn-continue" aria-label="Voltar para página de produtos e continuar comprando">Continuar comprando</a>
    </div>
</body>
</html>
